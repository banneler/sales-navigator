<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales-Navigator | Content Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen flex flex-col overflow-hidden" style="font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;">
  <header class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center border-b-4 border-orange-500 flex-shrink-0 z-10">
    <div class="flex items-center gap-4 min-w-0">
      <a href="index.html" class="text-slate-400 hover:text-white text-sm font-semibold whitespace-nowrap">← App</a>
      <h1 class="text-xl font-bold tracking-wide border-l border-slate-700 pl-4 truncate">Content Admin</h1>
    </div>
    <p class="text-xs text-slate-400 hidden md:block">GitHub Contents API · one file per module</p>
  </header>

  <div class="flex-1 overflow-y-auto p-6 md:p-8">
    <div class="max-w-[1100px] mx-auto space-y-8">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <h2 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Repository &amp; authentication</h2>
        <div class="grid gap-4 md:grid-cols-2">
          <div>
            <label class="block text-sm font-semibold text-slate-700">GitHub org / user</label>
            <input type="text" id="cfg-owner" class="w-full border border-slate-300 p-2 rounded mt-1 bg-slate-50 focus:bg-white outline-none focus:border-orange-500" placeholder="owner" autocomplete="off">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700">Repository name</label>
            <input type="text" id="cfg-repo" class="w-full border border-slate-300 p-2 rounded mt-1 bg-slate-50 focus:bg-white outline-none focus:border-orange-500" placeholder="sales-navigator" autocomplete="off">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700">Branch</label>
            <input type="text" id="cfg-branch" class="w-full border border-slate-300 p-2 rounded mt-1 bg-slate-50 focus:bg-white outline-none focus:border-orange-500" placeholder="main" autocomplete="off">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700">Personal Access Token</label>
            <input type="password" id="pat-input" class="w-full border border-slate-300 p-2 rounded mt-1 bg-slate-50 focus:bg-white outline-none focus:border-orange-500" placeholder="repo scope" autocomplete="off">
          </div>
        </div>
        <button type="button" id="save-config-btn" class="mt-4 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2 px-4 rounded-lg text-sm">Save repo settings (local)</button>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <h2 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Module JSON</h2>
        <div class="flex flex-wrap gap-3 mb-4 items-end">
          <div class="flex-1 min-w-[200px]">
            <label class="block text-sm font-semibold text-slate-700">Module</label>
            <select id="module-select" class="w-full border border-slate-300 p-2 rounded mt-1 bg-white outline-none focus:border-orange-500"></select>
          </div>
          <input type="hidden" id="file-sha" value="">
          <button type="button" id="load-from-github-btn" class="bg-slate-900 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded-lg shadow-sm transition text-sm">
            <i class="fa-solid fa-download mr-2"></i>Load from GitHub
          </button>
          <button type="button" id="push-to-github-btn" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded-lg shadow-sm transition text-sm">
            <i class="fa-solid fa-cloud-arrow-up mr-2"></i>Push to GitHub
          </button>
          <button type="button" id="format-json-btn" class="bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold py-2 px-4 rounded-lg text-sm">Format JSON</button>
        </div>
        <textarea id="json-editor" class="w-full min-h-[420px] border border-slate-300 p-3 rounded font-mono text-sm bg-slate-50 focus:bg-white outline-none focus:border-orange-500" placeholder='Load a module, then edit JSON. Path: modules/&lt;id&gt;/content.json'></textarea>
        <p class="text-xs text-slate-500 mt-2">After loading, the blob <code class="bg-slate-100 px-1 rounded">sha</code> is stored for the next save. If the file changed on GitHub, load again before pushing.</p>
      </div>
    </div>
  </div>

  <div id="loading-overlay" class="fixed inset-0 z-[100] hidden bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center">
    <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-orange-500 mb-4"></div>
    <p class="text-white font-bold tracking-wider" id="loading-text">Working…</p>
  </div>
  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[150] flex flex-col gap-2 pointer-events-none"></div>

  <script type="module" src="js/admin-app.js"></script>
</body>
</html>
