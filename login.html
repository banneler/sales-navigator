<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in | Sales Navigator</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/tailwind.css" />
</head>
<body class="min-h-screen bg-slate-100 text-slate-800 font-sans flex flex-col" style="font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;">
  <header class="bg-slate-900 text-white border-b-4 border-orange-500 shadow-md">
    <div class="max-w-lg mx-auto px-4 py-5 flex items-center gap-4">
      <img src="Proposal_Assets/GPC-White-1-1.webp" alt="GPC Logo" class="h-9 flex-shrink-0">
      <div class="border-l border-slate-700 pl-4 min-w-0">
        <h1 class="text-lg font-bold tracking-wide">Sales Navigator</h1>
        <p class="text-xs text-slate-400">Sign in to continue</p>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white shadow-xl overflow-hidden">
      <div class="h-1.5 bg-gradient-to-r from-orange-500 via-orange-400 to-amber-400"></div>
      <div class="p-8 space-y-8">
        <form id="login-form" class="space-y-5">
          <div>
            <h2 class="text-lg font-semibold text-slate-900">Email &amp; password</h2>
            <p class="text-sm text-slate-500 mt-1">Use your work email and password.</p>
          </div>

          <div id="field-name" class="hidden space-y-2">
            <label for="name" class="block text-sm font-medium text-slate-700">Name</label>
            <input id="name" name="name" type="text" autocomplete="name"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 shadow-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/30"
              placeholder="Your name">
          </div>

          <div class="space-y-2">
            <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 shadow-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/30"
              placeholder="you@company.com">
          </div>

          <div class="space-y-2">
            <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required minlength="8"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 shadow-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/30"
              placeholder="••••••••">
          </div>

          <p id="auth-error" class="hidden text-sm text-red-600" role="alert"></p>

          <button type="submit" id="submit-btn"
            class="w-full rounded-lg bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 px-4 shadow-md transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-orange-300 focus-visible:ring-offset-2">
            Sign in
          </button>

          <button type="button" id="mode-toggle" class="w-full text-sm text-orange-700 hover:text-orange-800 font-medium">
            Need an account? Sign up
          </button>
        </form>

        <div class="relative">
          <div class="absolute inset-0 flex items-center" aria-hidden="true">
            <div class="w-full border-t border-slate-200"></div>
          </div>
          <div class="relative flex justify-center text-xs uppercase tracking-wide">
            <span class="bg-white px-3 text-slate-400 font-semibold">Or</span>
          </div>
        </div>

        <form id="magic-form" class="space-y-4">
          <div>
            <h2 class="text-lg font-semibold text-slate-900">Magic link</h2>
            <p class="text-sm text-slate-500 mt-1">We’ll email you a one-time sign-in link.</p>
          </div>
          <div class="flex flex-col sm:flex-row gap-2">
            <input id="magic-email" name="magic-email" type="email" autocomplete="email" required
              class="flex-1 rounded-lg border border-slate-300 px-3 py-2 text-slate-900 shadow-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/30"
              placeholder="you@company.com">
            <button type="submit" id="magic-submit"
              class="rounded-lg bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2 px-4 whitespace-nowrap transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400">
              Email link
            </button>
          </div>
          <p id="auth-info" class="hidden text-sm text-slate-600" role="status"></p>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
