<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales-Navigator | GPC Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .module-markdown { color: #334155; line-height: 1.65; font-size: 0.9375rem; }
    .module-markdown h2 { font-size: 1.125rem; font-weight: 700; color: #0f172a; margin-top: 1.5rem; margin-bottom: 0.75rem; }
    .module-markdown h2:first-child { margin-top: 0; }
    .module-markdown h3 { font-size: 1rem; font-weight: 700; color: #0f172a; margin-top: 1.25rem; margin-bottom: 0.5rem; }
    .module-markdown p { margin-bottom: 0.75rem; }
    .module-markdown ul { list-style: disc; padding-left: 1.25rem; margin: 0.5rem 0 0.75rem; }
    .module-markdown li { margin-bottom: 0.35rem; }
    .module-markdown strong { font-weight: 600; color: #0f172a; }
    .module-markdown code { background: #f1f5f9; padding: 0.125rem 0.35rem; border-radius: 0.25rem; font-size: 0.875em; }
    .module-markdown a { color: #ea580c; text-decoration: underline; text-underline-offset: 2px; }
    .module-markdown a:hover { color: #c2410c; }
    .module-markdown hr { border: 0; border-top: 1px solid #e2e8f0; margin: 1.25rem 0; }
    .module-markdown blockquote { border-left: 4px solid #fdba74; padding-left: 1rem; margin: 0.75rem 0; color: #64748b; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen flex flex-col overflow-hidden" style="font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;">
  <div id="main-content" class="flex-1 flex flex-col min-h-0 overflow-hidden">
    <header id="main-header" class="bg-slate-900 text-white p-4 shadow-md flex items-center z-10 border-b-4 border-orange-500 flex-shrink-0">
      <div class="flex items-center gap-4 flex-1 min-w-0">
        <img src="Proposal_Assets/GPC-White-1-1.webp" alt="GPC Logo" class="h-8 flex-shrink-0">
        <h1 class="text-xl font-bold tracking-wide border-l border-slate-700 pl-4 flex-shrink-0">Sales-Navigator</h1>
        <p class="text-sm text-slate-400 hidden sm:block truncate">Interactive training modules</p>
      </div>
    </header>
    <div id="app-root" class="flex-1 flex overflow-hidden min-h-0"></div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
