<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales-Navigator | GPC Onboarding</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/tailwind.css" />
  <style id="map-book-shell-style">
    /* Full-bleed map book: single app header, no extra padding chrome */
    body.map-book-active #main-panel {
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    body.map-book-active #module-host {
      max-width: none;
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen flex flex-col overflow-hidden" style="font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;">
  <div id="main-content" class="flex-1 flex flex-col min-h-0 overflow-hidden">
    <header id="main-header" class="bg-slate-900 text-white p-3 sm:p-4 shadow-md flex items-center justify-between gap-2 sm:gap-4 z-10 border-b-4 border-orange-500 flex-shrink-0">
      <div class="flex items-center gap-2 sm:gap-4 flex-1 min-w-0">
        <button type="button" id="mobile-menu-btn" class="md:hidden flex items-center justify-center w-10 h-10 -ml-1 rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 transition-colors" aria-label="Open menu">
          <i class="fa-solid fa-bars text-lg" aria-hidden="true"></i>
        </button>
        <img src="Proposal_Assets/GPC-White-1-1.webp" alt="GPC Logo" class="h-7 sm:h-8 flex-shrink-0">
        <h1 class="text-base sm:text-xl font-bold tracking-wide border-l border-slate-700 pl-2 sm:pl-4 flex-shrink-0 truncate">Sales-Navigator</h1>
        <p class="text-sm text-slate-400 hidden lg:block truncate">Interactive training modules</p>
      </div>
      <div class="flex items-center gap-1.5 sm:gap-2 flex-shrink-0">
        <div class="flex items-center gap-1.5 sm:gap-2 sm:mr-2 px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg bg-slate-800 border border-slate-700" title="Your Total XP">
          <i class="fa-solid fa-star text-orange-400 text-xs sm:text-sm" aria-hidden="true"></i>
          <span class="js-xp-display font-bold text-slate-200 text-xs sm:text-sm tabular-nums">0</span>
          <span class="text-xs text-slate-500 font-medium hidden sm:inline">XP</span>
        </div>
        <button type="button" id="fiber-path-btn" class="inline-flex items-center gap-2 rounded-lg bg-orange-500/15 hover:bg-orange-500/25 border border-orange-400/40 text-orange-100 text-sm font-semibold px-2.5 sm:px-3 py-2 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-orange-300" title="View your progress across modules">
          <i class="fa-solid fa-route" aria-hidden="true"></i>
          <span class="hidden sm:inline">Fiber path</span>
        </button>
      </div>
    </header>
    <div id="app-root" class="flex-1 flex overflow-hidden min-h-0"></div>
  </div>
  <!-- Classic script so console reset works in all browsers (Safari may not expose ES-module globals as bare names). Keys: see js/lib/progress-state.js + gamification.js -->
  <script>
    (function () {
      function resetSalesNavigatorGameState() {
        localStorage.removeItem('sn:module-visited:v1');
        localStorage.removeItem('sn:module-completed:v1');
        localStorage.removeItem('sn:xp');
        location.reload();
      }
      globalThis.resetSalesNavigatorGameState = resetSalesNavigatorGameState;
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
